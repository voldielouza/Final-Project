openapi: 3.0.3

info: 
  title: Transportation Company API
  version: 1.0.0
  description: API documentation for the Transportation API

servers:
  - url: http://localhost:3000/api

tags:
  - name: Auth
    description: User authentication operations
  - name: Orders
    description: Operations related to orders
  - name: Trucks
    description: Operations related to trucks
  - name: Routes
    description: Operations related to routes
  

paths: 
  /orders: 
    get:
      security:
      - bearerAuth: []
      tags:
        - Orders
      summary: Get all orders
      description: Retrieve a list of all orders. 
      responses:
        '200':
          description: A list of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Orders'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InvalidAuth'
        '404': 
          $ref: '#/components/responses/NotFound'   
    post: 
      security:
        - bearerAuth: []
      tags:
        - Orders
      summary: Create a new order
      description: Create a new order
      requestBody:
        description: The order object to create
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Orders'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Orders'
        '400':
          $ref: '#/components/responses/InvalidOrderInput'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InvalidAuth'
  /orders/{id}:
    get:
      security:
        - bearerAuth: []
      tags:
        - Orders
      summary: Get a order by id
      description: Retrieve a single order by its ID.
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses: 
        '200':
          description: A single order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Orders'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InvalidAuth'
        '404': 
          $ref: '#/components/responses/NotFound'
        '400': 
          $ref: '#/components/responses/InvalidId'
    put: 
      security:
        - bearerAuth: []
      tags:
        - Orders
      summary: Updates order By Id
      description: Updates a single order by its ID.
      requestBody:
        description: Feilds to update for the order. At least one of "name", "price" or "shippingAddress" must be provided.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatedOrders'
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses: 
        '200':
          description: Order updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Orders'
        '400':
          $ref: '#/components/responses/InvalidUpOrderInput'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InvalidAuth' 
        '404': 
          $ref: '#/components/responses/NotFound'
    delete:
      security:
        - bearerAuth: []
      tags:
        - Orders
      summary: Deletes order By Id
      description: Deletes a single order by its ID.
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses: 
        '204':
          description: Order deleted successfully
        '400': 
          $ref: '#/components/responses/InvalidId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InvalidAuth'
        '404': 
          $ref: '#/components/responses/NotFound'
  
  /trucks: 
    get:
      security:
        - bearerAuth: []
      
      tags:
        - Trucks
      summary: Get all trucks
      description: Retrieve a list of all trucks. 
      responses:
        '200':
          description: A list of trucks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Trucks'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InvalidAuth'
        '404': 
          $ref: '#/components/responses/NotFound'   
    post: 
      security:
        - bearerAuth: []
      tags:
        - Trucks
      summary: Create a new truck
      description: Create a new truck
      requestBody:
        description: The truck object to create
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Trucks'
      responses:
        '201':
          description: Truck created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trucks'
        '400':
          $ref: '#/components/responses/InvalidTruckInput'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InvalidAuth'
  /trucks/{id}:
    get:
      security:
        - bearerAuth: []
      tags:
        - Trucks
      summary: Get a truck by id
      description: Retrieve a single truck by its ID.
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses: 
        '200':
          description: A single truck
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trucks'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InvalidAuth'
        '404': 
          $ref: '#/components/responses/NotFound'
        '400': 
          $ref: '#/components/responses/InvalidId'
    put: 
      security:
        - bearerAuth: []
      tags:
        - Trucks
      summary: Updates truck By Id
      description: Updates a single truck by its ID.
      requestBody:
        description: Feilds to update for the truck. At least one of "name", "price" or "shippingAddress" must be provided.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatedTrucks'
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses: 
        '200':
          description: Truck updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trucks'
        '400':
          $ref: '#/components/responses/InvalidUpTruckInput'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InvalidAuth' 
        '404': 
          $ref: '#/components/responses/NotFound'
    delete:
      security:
        - bearerAuth: []
      tags:
        - Trucks
      summary: Deletes truck By Id
      description: Deletes a single truck by its ID.
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses: 
        '204':
          description: Truck deleted successfully
        '400': 
          $ref: '#/components/responses/InvalidId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InvalidAuth'
        '404': 
          $ref: '#/components/responses/NotFound'
  
  /routes: 
    get:
      security: 
      - bearerAuth: []
      tags:
        - Routes
      summary: Get all routes
      description: Retrieve a list of all routes. 
      responses:
        '200':
          description: A list of routes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Routes'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InvalidAuth'
        '404': 
          $ref: '#/components/responses/NotFound'   
    post: 
      security:
        - bearerAuth: []
      tags:
        - Routes
      summary: Create a new routes
      description: Create a new routes
      requestBody:
        description: The routes object to create
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Routes'
      responses:
        '201':
          description: Route created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Routes'
        '400':
          $ref: '#/components/responses/InvalidRouteInput'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InvalidAuth'
  /routes/{id}:
    get:
      security:
        - bearerAuth: []
      tags:
        - Routes
      summary: Get a route by id
      description: Retrieve a single route by its ID.
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses: 
        '200':
          description: A single order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Routes'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InvalidAuth'
        '404': 
          $ref: '#/components/responses/NotFound'
        '400': 
          $ref: '#/components/responses/InvalidId'
    put: 
      security:
        - bearerAuth: []
      tags:
        - Routes
      summary: Updates route By Id
      description: Updates a single route by its ID.
      requestBody:
        description: Feilds to update for the route. At least one of "name", "price" or "shippingAddress" must be provided.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatedRoutes'
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses: 
        '200':
          description: Order updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Routes'
        '400':
        #invalid input or id is not a positive integer 
          $ref: '#/components/responses/InvalidUpRouteInput'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InvalidAuth' 
        '404': 
          $ref: '#/components/responses/NotFound'
    delete:
      security:
        - bearerAuth: []
      tags:
        - Routes
      summary: Deletes route By Id
      description: Deletes a single route by its ID.
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses: 
        '204':
          description: Order deleted successfully
        '400': 
          $ref: '#/components/responses/InvalidId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/InvalidAuth'
        '404': 
          $ref: '#/components/responses/NotFound'
  
  /auth/login:
    post:
      tags:
        - Auth
      summary: Authenticate user
      description: Authenticate a user and return an access token.
      requestBody:
        description: User login credentials
        required: true
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/AuthCredentials'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                example: 
                  accessToken: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
        '400':
          $ref: '#/components/responses/InvalidUserInput' 
        '401':
          $ref: '#/components/responses/InvalidCredentials'
  /auth/signup:
    post:
      tags:
        - Auth
      summary: Register user
      description: Creates a new user account.
      requestBody: 
        description: User signup credentials
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpCredentials'
      responses:
        '201':
          description: Sign up successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Users'
        '400':
          $ref: '#/components/responses/InvalidSignUpInput' 
        '409':
          description: Duplicate email
          content:
            application/json: 
              schema:
                type: string
                properties:
                  error:
                    type: string
                example:
                  error: 'Email has already been used' 

components: 
  schemas: 
    SignUpCredentials:
      type: object
      required:
        - email
        - address
        - password
      properties:
        email:
          type: string
          example: 'user@example.com'
        address:
          type: string
          example: '123 Example St'
        password:
          type: string
          example: 'password123'
        role:
          type: string
          enum: [CLIENT, EMPLOYEE, ADMIN]
          default: CLIENT
          example: 'CLIENT'
    AuthCredentials:
      type: object
      properties:
        email:
          type: string
          example: 'admin@email.com'
        password:
          type: string
          example: 'password1'
    Users:
      type: object
      properties:
            id:
              type: integer
              readOnly: true
              example: 1
            email: 
              type: string
              example: 'user@example.com'
            role:
              type: string
              example: 'USER'
    
    UpdatedOrders:
      type: object     
      properties:
            name: 
              type: string
              example: 'Headphones'
            price:
              type: number
              example: 200
            shippingAddress:
              type: string
              example: '123 Example St'
    Orders:
      type: object
      properties:
            id:
              type: integer
              readOnly: true
              example: 1
            name: 
              type: string
              example: 'Headphones'
            price:
              type: number
              example: 200
            shippingAddress:
              type: string
              example: '123 Example St'
            truck: 
              type: integer
              example: 1
            clientId: 
              type: integer
              readOnly: true
              example: 1

    UpdatedTrucks:
      type: object
      properties:
        name:
          type: string
          example: 'Truck1'
        licenseNumber: 
          type: string
          example: 'TRK-001'
    Trucks:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        name: 
          type: string
          example: 'Truck1'
        licenseNumber:
          type: string
          example: 'TRK-001'

    UpdatedRoutes:
      type: object
      properties: 
        name: 
          type: string
          example: 'North Route' 
        street:
          type: string
          example: 'I 95'
    Routes:
      type: object
      properties:
        name: 
          type: string
          example: 'North Route' 
        street:
          type: string
          example: 'I 95'

  parameters: 
    ResourceId:
      name: id
      in: path
      required: true
      description: Resource ID
      schema:
        type: integer
        example: 1
    
  responses:
    NotFound:
      description: Resource not found
      content: 
        application/json:
          schema:
            type: object
            properties:
              error: 
                type: string
            example: 
              error: 'Resource 1 not found'  
    InvalidId:
      description: Invalid ID
      content: 
        application/json:
          schema:
            type: object
            properties:
              error: 
                type: array
                items:
                  type: string
            example:   
              error: ['ID must be a positive integer']

    InvalidSignUpInput:
      description: Bad request due to invalid data
      content:
        application/json: 
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: string
            example:
              errors:
                - 'Email is required'
                - 'Password is required'
                - 'Address is required'
    InvalidUserInput:
      description: Bad request due to invalid data
      content:
        application/json: 
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: string
            example:
              errors:
                - 'Email is required'
                - 'Password is required'
    Unauthorized:
      description: Client is not authenticated
      content:
        application/json:
          schema:
            type: object
            properties: 
              error:
                type: string
            example: 
              error: 'Not authenticated. Please provide a valid token.'   
    InvalidCredentials:
      description: Invalid credentials
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example:
              error: 'Invalid credentials'  
    InvalidAuth:
      description: Client is not authorized
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example:
              error: 'Forbidden: insufficcient permission.' 

    InvalidOrderInput:
      description: Bad request due to invalid data
      content: 
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: string
            example:
              errors:
                - 'Name must be at least 3 characters'
    InvalidUpOrderInput: 
      description: Bad request due to invalid data
      content: 
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: string
            example:
              errors:
                - 'Name must be at least 3 characters'

    InvalidTruckInput:
      description: Bad request due to invalid data
      content: 
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: string
            example:
              errors:
                - 'Name must be at least 3 characters'
    InvalidUpTruckInput:
      description: Bad request due to invalid data
      content: 
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: string
            example:
              errors:
                - 'Name must be at least 3 characters'

    InvalidRouteInput:
      description: Bad request due to invalid data
      content: 
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: string
            example:
              errors:
                - 'Name must be at least 3 characters'   
    InvalidUpRouteInput:
      description: Bad request due to invalid data
      content: 
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: string
            example:
              errors:
                - 'Title must be at least 3 characters'
             
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
